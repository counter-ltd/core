name: Build iOS IPA

on:
  push:
    branches: [main]
    paths:
      - 'apps/ios/**'
      - '.github/workflows/build-ios.yml'

permissions:
  contents: write

concurrency:
  group: build-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build unsigned IPA
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (unsigned)
        working-directory: apps/ios
        run: |
          xcodebuild \
            -project Counter.xcodeproj \
            -scheme Counter \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Package IPA
        working-directory: apps/ios
        run: |
          APP=$(find build/DerivedData -name "Counter.app" -not -path "*/\.*" | head -1)
          mkdir -p build/unsigned/Payload
          cp -r "$APP" build/unsigned/Payload/
          cd build/unsigned
          zip -qr ../Counter-unsigned.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Counter-unsigned-${{ github.sha }}
          path: apps/ios/build/Counter-unsigned.ipa
          retention-days: 30

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.sha }}"
          SHORT="${SHA:0:7}"
          DATE=$(date -u '+%y%m%d')
          MSG=$(git log -1 --format='%s')
          VER=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" apps/ios/Counter/Info.plist)
          TAG="ios-$VER-$DATE-$SHORT"
          /opt/homebrew/bin/gh release create "$TAG" apps/ios/build/Counter-unsigned.ipa \
            --title "Counter iOS $VER — $DATE ($MSG)" \
            --notes "Unsigned IPA built from [\`$SHORT\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})." \
            --prerelease
